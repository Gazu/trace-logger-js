name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test-build-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      - name: Release Check
        run: npm run release:check

      - name: Production Dependency Audit
        run: npm run audit:packages
